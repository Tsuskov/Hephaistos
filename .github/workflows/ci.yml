name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cadmus is a sibling path dependency (`../Cadmus`); clone it next to this
      # checkout so cargo can resolve it.
      - name: Check out Cadmus (path dependency)
        run: git clone --depth 1 https://github.com/Tsuskov/Cadmus.git ../Cadmus

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --verbose

      - name: Test (incl. full gradient-check suite)
        run: cargo test --release --verbose
